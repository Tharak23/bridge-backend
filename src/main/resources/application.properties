spring.application.name=Bridge
server.port=${PORT:8080}

# MySQL — set MYSQL_* in .env (local) or Render env (prod). Do not use application-local.properties for old Postgres URLs.
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:bridge}?useSSL=${MYSQL_USE_SSL:false}&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=${MYSQL_USER:bridge}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Clerk JWT
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://gentle-elk-83.clerk.accounts.dev/.well-known/jwks.json

# Optional: same value as frontend VITE_BRIDGE_ADMIN_KEY; required for GET /api/admin/stats
# BRIDGE_ADMIN_KEY=
